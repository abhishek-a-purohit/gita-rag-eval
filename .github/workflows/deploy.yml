name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write           # needed by peaceiris/actions-gh-pages to push to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # No VITE_ANTHROPIC_KEY set here — the deployed site runs in mock mode.
        # To enable live mode on the deployed site, add the secret in:
        # Settings → Secrets and variables → Actions → New repository secret
        # Name: VITE_ANTHROPIC_KEY   Value: sk-ant-...
        # Then uncomment the env block below:
        # env:
        #   VITE_ANTHROPIC_KEY: ${{ secrets.VITE_ANTHROPIC_KEY }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
